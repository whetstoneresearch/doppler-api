openapi: 3.1.0
info:
  title: Doppler Launch API
  version: 0.1.0
  description: |
    REST API for creating Doppler launches across EVM and Solana create flows.
    v1 deployment profile supports:
    - EVM multicurve/static with noOp migration
    - EVM dynamic with uniswapV2 or uniswapV4 migration
    - Solana devnet XYK create-only launches on /v1/solana/launches or /v1/launches
    - binary governance toggle for EVM only
    Prefer multicurve on V4-capable EVM chains; static is a compatibility path.
servers:
  - url: http://localhost:3000
security:
  - ApiKeyAuth: []
tags:
  - name: Launches
  - name: Status
  - name: Ops
  - name: Capabilities
paths:
  /v1/launches:
    post:
      tags: [Launches]
      summary: Create an EVM or Solana launch
      operationId: createLaunch
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Reuse the same key for safe retries of identical create payloads (required in shared mode, recommended in standalone mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CreateLaunchRequest'
                - $ref: '#/components/schemas/GenericSolanaCreateLaunchRequest'
      responses:
        '200':
          description: Launch submitted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CreateLaunchResponse'
                  - $ref: '#/components/schemas/SolanaCreateLaunchResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /v1/solana/launches:
    post:
      tags: [Launches]
      summary: Create a Solana launch
      operationId: createSolanaLaunch
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Reuse the same key for safe retries of identical create payloads (required in shared mode, recommended in standalone mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DedicatedSolanaCreateLaunchRequest'
      responses:
        '200':
          description: Solana launch submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolanaCreateLaunchResponse'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '501':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /v1/launches/multicurve:
    post:
      tags: [Launches]
      summary: Create multicurve launch (alias)
      operationId: createMulticurveLaunch
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Reuse the same key for safe retries of identical create payloads (required in shared mode, recommended in standalone mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLaunchRequest'
      responses:
        '200':
          description: Launch submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLaunchResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /v1/launches/static:
    post:
      tags: [Launches]
      summary: Create static launch (alias)
      operationId: createStaticLaunch
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Reuse the same key for safe retries of identical create payloads (required in shared mode, recommended in standalone mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLaunchRequest'
      responses:
        '200':
          description: Launch submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLaunchResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /v1/launches/dynamic:
    post:
      tags: [Launches]
      summary: Create dynamic launch (alias)
      operationId: createDynamicLaunch
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Reuse the same key for safe retries of identical create payloads (required in shared mode, recommended in standalone mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLaunchRequest'
      responses:
        '200':
          description: Launch submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLaunchResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /v1/launches/{launchId}:
    get:
      tags: [Status]
      summary: Fetch launch status
      operationId: getLaunchStatus
      parameters:
        - name: launchId
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d+:0x[a-fA-F0-9]{64}$'
      responses:
        '200':
          description: Launch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchStatusResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /v1/capabilities:
    get:
      tags: [Capabilities]
      summary: Get deployment capabilities
      operationId: getCapabilities
      responses:
        '200':
          description: Capabilities matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /health:
    get:
      tags: [Ops]
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required: [status]
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /ready:
    get:
      tags: [Ops]
      summary: Readiness check
      operationId: getReady
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Degraded readiness
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /metrics:
    get:
      tags: [Ops]
      summary: Metrics snapshot
      operationId: getMetrics
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    HexAddress:
      type: string
      pattern: '^0x[a-fA-F0-9]{40}$'
    HexHash:
      type: string
      pattern: '^0x[a-fA-F0-9]{64}$'
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
              description: For 5xx responses this is always "Internal server error".
            details: {}
          required: [code, message]
      required: [error]
    TokenMetadata:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        symbol:
          type: string
          minLength: 1
        tokenURI:
          type: string
          minLength: 1
      required: [name, symbol, tokenURI]
    Economics:
      type: object
      properties:
        totalSupply:
          type: string
          pattern: '^\d+$'
        tokensForSale:
          type: string
          pattern: '^\d+$'
          description: >
            Optional amount allocated to the launch market.
            Defaults to totalSupply when omitted.
            If tokensForSale is less than totalSupply, it must be at least 20% of totalSupply.
        allocations:
          type: object
          description: >
            Optional non-market allocation controls for the non-sale remainder.
            Use recipients[] to split remainder across up to 10 unique addresses.
            Allocation amounts must sum to totalSupply - tokensForSale.
          properties:
            recipientAddress:
              $ref: '#/components/schemas/HexAddress'
            recipients:
              type: array
              maxItems: 10
              items:
                type: object
                properties:
                  address:
                    $ref: '#/components/schemas/HexAddress'
                  amount:
                    type: string
                    pattern: '^\d+$'
                required: [address, amount]
            mode:
              type: string
              enum: [vest, unlock, vault]
            durationSeconds:
              type: integer
              minimum: 0
            cliffDurationSeconds:
              type: integer
              minimum: 0
      required: [totalSupply]
    FeeBeneficiary:
      type: object
      description: >
        Fee beneficiary share entry in WAD precision.
        Up to 10 unique addresses are supported.
      properties:
        address:
          $ref: '#/components/schemas/HexAddress'
        sharesWad:
          type: string
          pattern: '^\d+$'
      required: [address, sharesWad]
    GovernanceObject:
      type: object
      properties:
        enabled:
          type: boolean
        mode:
          type: string
          enum: [noOp, default]
      required: [enabled]
    GovernanceInput:
      oneOf:
        - type: boolean
        - $ref: '#/components/schemas/GovernanceObject'
    MigrationConfig:
      description: >
        Dynamic launches require `uniswapV2` or `uniswapV4`.
        Multicurve and static launches use `noOp` in this API profile.
        For `uniswapV4`, streamable fee beneficiaries are derived from `feeBeneficiaries`
        (or the default 95/5 split).
        `uniswapV3` is reserved and currently returns MIGRATION_NOT_IMPLEMENTED.
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum: [noOp, uniswapV2, uniswapV3]
          required: [type]
        - type: object
          properties:
            type:
              type: string
              const: uniswapV4
            fee:
              type: integer
              minimum: 0
            tickSpacing:
              type: integer
              minimum: 1
          required: [type, fee, tickSpacing]
    PairingConfig:
      type: object
      properties:
        numeraireAddress:
          $ref: '#/components/schemas/HexAddress'
    PricingConfig:
      type: object
      properties:
        numerairePriceUsd:
          type: number
          exclusiveMinimum: 0
    PresetCurveConfig:
      type: object
      properties:
        type:
          type: string
          const: preset
        presets:
          type: array
          items:
            type: string
            enum: [low, medium, high]
        fee:
          type: integer
          minimum: 1
        tickSpacing:
          type: integer
          minimum: 1
      required: [type]
    RangesCurve:
      type: object
      properties:
        marketCapStartUsd:
          type: number
          exclusiveMinimum: 0
        marketCapEndUsd:
          oneOf:
            - type: number
              exclusiveMinimum: 0
            - type: string
              const: max
        numPositions:
          type: integer
          minimum: 1
        sharesWad:
          type: string
          pattern: '^\d+$'
      required: [marketCapStartUsd, marketCapEndUsd, numPositions, sharesWad]
    RangesCurveConfig:
      type: object
      properties:
        type:
          type: string
          const: ranges
        fee:
          type: integer
          minimum: 1
        tickSpacing:
          type: integer
          minimum: 1
        curves:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RangesCurve'
      required: [type, curves]
    StaticPresetCurveConfig:
      type: object
      properties:
        type:
          type: string
          const: preset
        preset:
          type: string
          enum: [low, medium, high]
        fee:
          type: integer
          minimum: 1
        numPositions:
          type: integer
          minimum: 1
        maxShareToBeSoldWad:
          type: string
          pattern: '^\d+$'
      required: [type, preset]
    StaticRangeCurveConfig:
      type: object
      properties:
        type:
          type: string
          const: range
        marketCapStartUsd:
          type: number
          exclusiveMinimum: 0
        marketCapEndUsd:
          type: number
          exclusiveMinimum: 0
        fee:
          type: integer
          minimum: 1
        numPositions:
          type: integer
          minimum: 1
        maxShareToBeSoldWad:
          type: string
          pattern: '^\d+$'
      required: [type, marketCapStartUsd, marketCapEndUsd]
    MulticurveInitializerStandard:
      type: object
      properties:
        type:
          type: string
          const: standard
      required: [type]
    MulticurveInitializerScheduled:
      type: object
      properties:
        type:
          type: string
          const: scheduled
        startTime:
          type: integer
          minimum: 1
      required: [type, startTime]
    MulticurveInitializerDecay:
      type: object
      properties:
        type:
          type: string
          const: decay
        startFee:
          type: integer
          minimum: 0
        durationSeconds:
          type: integer
          minimum: 1
        startTime:
          type: integer
          minimum: 0
      required: [type, startFee, durationSeconds]
    MulticurveInitializerRehype:
      type: object
      properties:
        type:
          type: string
          const: rehype
        config:
          type: object
          properties:
            hookAddress:
              $ref: '#/components/schemas/HexAddress'
            buybackDestination:
              $ref: '#/components/schemas/HexAddress'
            customFee:
              type: integer
              minimum: 0
            assetBuybackPercentWad:
              type: string
              pattern: '^\d+$'
            numeraireBuybackPercentWad:
              type: string
              pattern: '^\d+$'
            beneficiaryPercentWad:
              type: string
              pattern: '^\d+$'
            lpPercentWad:
              type: string
              pattern: '^\d+$'
            graduationCalldata:
              type: string
              pattern: '^0x[0-9a-fA-F]*$'
            graduationMarketCap:
              type: number
              exclusiveMinimum: 0
            numerairePrice:
              type: number
              exclusiveMinimum: 0
            farTick:
              type: integer
          required:
            [
              hookAddress,
              buybackDestination,
              customFee,
              assetBuybackPercentWad,
              numeraireBuybackPercentWad,
              beneficiaryPercentWad,
              lpPercentWad,
            ]
      required: [type, config]
    MulticurveAuction:
      type: object
      properties:
        type:
          type: string
          const: multicurve
        curveConfig:
          oneOf:
            - $ref: '#/components/schemas/PresetCurveConfig'
            - $ref: '#/components/schemas/RangesCurveConfig'
        initializer:
          oneOf:
            - $ref: '#/components/schemas/MulticurveInitializerStandard'
            - $ref: '#/components/schemas/MulticurveInitializerScheduled'
            - $ref: '#/components/schemas/MulticurveInitializerDecay'
            - $ref: '#/components/schemas/MulticurveInitializerRehype'
      required: [type, curveConfig]
    StaticAuction:
      type: object
      description: >
        Static Uniswap V3 launch configuration. Prefer multicurve on V4-capable chains.
      properties:
        type:
          type: string
          const: static
        curveConfig:
          oneOf:
            - $ref: '#/components/schemas/StaticPresetCurveConfig'
            - $ref: '#/components/schemas/StaticRangeCurveConfig'
      required: [type, curveConfig]
    DynamicRangeCurveConfig:
      type: object
      properties:
        type:
          type: string
          const: range
        marketCapStartUsd:
          type: number
          exclusiveMinimum: 0
        marketCapMinUsd:
          type: number
          exclusiveMinimum: 0
        minProceeds:
          type: string
          pattern: '^\d+(\.\d+)?$'
          description: Decimal string in numeraire units (for example "0.01")
        maxProceeds:
          type: string
          pattern: '^\d+(\.\d+)?$'
          description: Decimal string in numeraire units (for example "0.1")
        durationSeconds:
          type: integer
          minimum: 1
        epochLengthSeconds:
          type: integer
          minimum: 1
        fee:
          type: integer
          minimum: 1
        tickSpacing:
          type: integer
          minimum: 1
        gamma:
          type: integer
          minimum: 1
        numPdSlugs:
          type: integer
          minimum: 1
      required: [type, marketCapStartUsd, marketCapMinUsd, minProceeds, maxProceeds]
    DynamicAuction:
      type: object
      description: >
        Dynamic auction for high value assets needing maximally capital-efficient price discovery.
        Requires migration.type="uniswapV2" or migration.type="uniswapV4" in this API profile.
      properties:
        type:
          type: string
          const: dynamic
        curveConfig:
          $ref: '#/components/schemas/DynamicRangeCurveConfig'
      required: [type, curveConfig]
    AuctionConfig:
      oneOf:
        - $ref: '#/components/schemas/MulticurveAuction'
        - $ref: '#/components/schemas/StaticAuction'
        - $ref: '#/components/schemas/DynamicAuction'
    SolanaNetwork:
      type: string
      enum: [solanaDevnet, solanaMainnetBeta]
    DedicatedSolanaNetwork:
      type: string
      enum: [devnet, mainnet-beta]
    SolanaAddress:
      type: string
    SolanaTokenMetadata:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
        symbol:
          type: string
          minLength: 1
          maxLength: 10
        tokenURI:
          type: string
          minLength: 1
          maxLength: 200
      required: [name, symbol, tokenURI]
    SolanaEconomics:
      type: object
      additionalProperties: false
      properties:
        totalSupply:
          type: string
          pattern: '^\d+$'
      required: [totalSupply]
    SolanaPairing:
      type: object
      additionalProperties: false
      properties:
        numeraireAddress:
          $ref: '#/components/schemas/SolanaAddress'
    SolanaPricing:
      type: object
      additionalProperties: false
      properties:
        numerairePriceUsd:
          type: number
          exclusiveMinimum: 0
    SolanaMigration:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          const: noOp
      required: [type]
    SolanaCurveConfig:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          const: range
        marketCapStartUsd:
          type: number
          exclusiveMinimum: 0
        marketCapEndUsd:
          type: number
          exclusiveMinimum: 0
      required: [type, marketCapStartUsd, marketCapEndUsd]
    SolanaAuction:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          const: xyk
        curveConfig:
          $ref: '#/components/schemas/SolanaCurveConfig'
        curveFeeBps:
          type: integer
          minimum: 0
          maximum: 10000
        allowBuy:
          type: boolean
        allowSell:
          type: boolean
      required: [type, curveConfig]
    DedicatedSolanaCreateLaunchRequest:
      type: object
      additionalProperties: false
      properties:
        network:
          $ref: '#/components/schemas/DedicatedSolanaNetwork'
        tokenMetadata:
          $ref: '#/components/schemas/SolanaTokenMetadata'
        economics:
          $ref: '#/components/schemas/SolanaEconomics'
        pairing:
          $ref: '#/components/schemas/SolanaPairing'
        pricing:
          $ref: '#/components/schemas/SolanaPricing'
        governance:
          type: boolean
          enum: [false]
        migration:
          $ref: '#/components/schemas/SolanaMigration'
        auction:
          $ref: '#/components/schemas/SolanaAuction'
      required: [tokenMetadata, economics, auction]
    GenericSolanaCreateLaunchRequest:
      type: object
      additionalProperties: false
      properties:
        network:
          $ref: '#/components/schemas/SolanaNetwork'
        tokenMetadata:
          $ref: '#/components/schemas/SolanaTokenMetadata'
        economics:
          $ref: '#/components/schemas/SolanaEconomics'
        pairing:
          $ref: '#/components/schemas/SolanaPairing'
        pricing:
          $ref: '#/components/schemas/SolanaPricing'
        governance:
          type: boolean
          enum: [false]
        migration:
          $ref: '#/components/schemas/SolanaMigration'
        auction:
          $ref: '#/components/schemas/SolanaAuction'
      required: [network, tokenMetadata, economics, auction]
    CreateLaunchRequest:
      type: object
      additionalProperties: false
      properties:
        chainId:
          type: integer
          minimum: 1
        userAddress:
          $ref: '#/components/schemas/HexAddress'
        integrationAddress:
          $ref: '#/components/schemas/HexAddress'
        tokenMetadata:
          $ref: '#/components/schemas/TokenMetadata'
        economics:
          $ref: '#/components/schemas/Economics'
        pairing:
          $ref: '#/components/schemas/PairingConfig'
        pricing:
          $ref: '#/components/schemas/PricingConfig'
        feeBeneficiaries:
          type: array
          maxItems: 10
          description: >
            Optional fee beneficiaries. If omitted, API defaults to 95% user / 5% protocol owner.
            If protocol owner is omitted in a custom list, shares must sum to 95% and API appends
            protocol owner at 5%. If protocol owner is included, shares must sum to 100% and the
            protocol owner share must be at least 5%.
          items:
            $ref: '#/components/schemas/FeeBeneficiary'
        governance:
          $ref: '#/components/schemas/GovernanceInput'
          description: >
            Binary governance toggle. false/omitted uses no governance;
            true (or { enabled: true }) uses default token-holder governance
            using OpenZeppelin Governor via the governance factory.
        migration:
          $ref: '#/components/schemas/MigrationConfig'
        auction:
          $ref: '#/components/schemas/AuctionConfig'
      required: [userAddress, tokenMetadata, economics, migration, auction]
    CreateLaunchResponse:
      type: object
      properties:
        launchId:
          type: string
        chainId:
          type: integer
        txHash:
          $ref: '#/components/schemas/HexHash'
        statusUrl:
          type: string
        predicted:
          type: object
          properties:
            tokenAddress:
              $ref: '#/components/schemas/HexAddress'
            poolId:
              $ref: '#/components/schemas/HexHash'
            gasEstimate:
              type: string
          required: [tokenAddress, poolId]
        effectiveConfig:
          type: object
          properties:
            tokensForSale:
              type: string
            allocationAmount:
              type: string
            allocationRecipient:
              $ref: '#/components/schemas/HexAddress'
            allocationRecipients:
              type: array
              items:
                type: object
                properties:
                  address:
                    $ref: '#/components/schemas/HexAddress'
                  amount:
                    type: string
                    pattern: '^\d+$'
                required: [address, amount]
            allocationLockMode:
              type: string
              enum: [none, vest, unlock, vault]
            allocationLockDurationSeconds:
              type: integer
              minimum: 0
            numeraireAddress:
              $ref: '#/components/schemas/HexAddress'
            numerairePriceUsd:
              type: number
            feeBeneficiariesSource:
              type: string
              enum: [default, request]
            initializer:
              oneOf:
                - type: object
                  properties:
                    type:
                      type: string
                      const: standard
                  required: [type]
                - type: object
                  properties:
                    type:
                      type: string
                      const: scheduled
                    startTime:
                      type: integer
                      minimum: 0
                  required: [type, startTime]
                - type: object
                  properties:
                    type:
                      type: string
                      const: decay
                    startTime:
                      type: integer
                      minimum: 0
                    startFee:
                      type: integer
                      minimum: 0
                    endFee:
                      type: integer
                      minimum: 0
                    durationSeconds:
                      type: integer
                      minimum: 0
                  required: [type, startTime, startFee, endFee, durationSeconds]
                - type: object
                  properties:
                    type:
                      type: string
                      const: rehype
                  required: [type]
          required:
            [
              tokensForSale,
              allocationAmount,
              allocationRecipient,
              allocationLockMode,
              allocationLockDurationSeconds,
              numeraireAddress,
              numerairePriceUsd,
              feeBeneficiariesSource,
            ]
      required: [launchId, chainId, txHash, statusUrl, predicted, effectiveConfig]
    SolanaCreateLaunchResponse:
      type: object
      properties:
        launchId:
          type: string
          description: Base58 launch PDA
        network:
          $ref: '#/components/schemas/SolanaNetwork'
        signature:
          type: string
        explorerUrl:
          type: string
        predicted:
          type: object
          properties:
            tokenAddress:
              $ref: '#/components/schemas/SolanaAddress'
            launchAuthorityAddress:
              $ref: '#/components/schemas/SolanaAddress'
            baseVaultAddress:
              $ref: '#/components/schemas/SolanaAddress'
            quoteVaultAddress:
              $ref: '#/components/schemas/SolanaAddress'
          required:
            [tokenAddress, launchAuthorityAddress, baseVaultAddress, quoteVaultAddress]
        effectiveConfig:
          type: object
          properties:
            tokensForSale:
              type: string
            allocationAmount:
              type: string
            allocationLockMode:
              type: string
              enum: [none]
            numeraireAddress:
              $ref: '#/components/schemas/SolanaAddress'
            numerairePriceUsd:
              type: number
            curveVirtualBase:
              type: string
            curveVirtualQuote:
              type: string
            curveFeeBps:
              type: integer
            allowBuy:
              type: boolean
            allowSell:
              type: boolean
            tokenDecimals:
              type: integer
          required:
            [
              tokensForSale,
              allocationAmount,
              allocationLockMode,
              numeraireAddress,
              numerairePriceUsd,
              curveVirtualBase,
              curveVirtualQuote,
              curveFeeBps,
              allowBuy,
              allowSell,
              tokenDecimals,
            ]
      required: [launchId, network, signature, explorerUrl, predicted, effectiveConfig]
    LaunchStatusResult:
      type: object
      properties:
        tokenAddress:
          $ref: '#/components/schemas/HexAddress'
        poolOrHookAddress:
          $ref: '#/components/schemas/HexAddress'
        poolId:
          $ref: '#/components/schemas/HexHash'
        blockNumber:
          type: string
      required: [tokenAddress, poolOrHookAddress, poolId, blockNumber]
    LaunchStatusResponse:
      type: object
      properties:
        launchId:
          type: string
        chainId:
          type: integer
        txHash:
          $ref: '#/components/schemas/HexHash'
        status:
          type: string
          enum: [pending, confirmed, reverted, not_found]
        confirmations:
          type: integer
        result:
          $ref: '#/components/schemas/LaunchStatusResult'
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [launchId, chainId, txHash, status, confirmations]
    CapabilitiesResponse:
      type: object
      properties:
        defaultChainId:
          type: integer
        pricing:
          type: object
          properties:
            enabled:
              type: boolean
            provider:
              type: string
          required: [enabled, provider]
        chains:
          type: array
          items:
            type: object
            properties:
              chainId:
                type: integer
              auctionTypes:
                type: array
                items:
                  type: string
              multicurveInitializers:
                type: array
                items:
                  type: string
                  enum: [standard, scheduled, decay, rehype]
              migrationModes:
                type: array
                items:
                  type: string
              governanceModes:
                type: array
                items:
                  type: string
              governanceEnabled:
                type: boolean
            required:
              [
                chainId,
                auctionTypes,
                multicurveInitializers,
                migrationModes,
                governanceModes,
                governanceEnabled,
              ]
        solana:
          type: object
          properties:
            enabled:
              type: boolean
            supportedNetworks:
              type: array
              items:
                $ref: '#/components/schemas/SolanaNetwork'
            unsupportedNetworks:
              type: array
              items:
                $ref: '#/components/schemas/SolanaNetwork'
            dedicatedRouteInputAliases:
              type: array
              items:
                $ref: '#/components/schemas/DedicatedSolanaNetwork'
            creationOnly:
              type: boolean
            numeraireAddress:
              $ref: '#/components/schemas/SolanaAddress'
            priceResolutionModes:
              type: array
              items:
                type: string
                enum: [request, fixed, coingecko]
          required:
            [
              enabled,
              supportedNetworks,
              unsupportedNetworks,
              dedicatedRouteInputAliases,
              creationOnly,
              numeraireAddress,
              priceResolutionModes,
            ]
      required: [defaultChainId, pricing, chains, solana]
    ReadyCheck:
      type: object
      properties:
        chainId:
          type: integer
        ok:
          type: boolean
        latestBlock:
          type: string
        error:
          type: string
      required: [chainId, ok]
    SolanaReadyCheck:
      type: object
      properties:
        name:
          type: string
          enum: [rpcReachable, latestBlockhash, initializerConfig, addressLookupTable]
        ok:
          type: boolean
        error:
          type: string
      required: [name, ok]
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, degraded]
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ReadyCheck'
        solana:
          type: object
          properties:
            enabled:
              type: boolean
            ok:
              type: boolean
            network:
              type: string
              enum: [solanaDevnet]
            checks:
              type: array
              items:
                $ref: '#/components/schemas/SolanaReadyCheck'
          required: [enabled, ok, checks]
      required: [status, checks, solana]
    MetricsResponse:
      type: object
      properties:
        startedAt:
          type: string
        uptimeSec:
          type: integer
        http:
          type: object
          properties:
            totalRequests:
              type: integer
            byStatusClass:
              type: object
              additionalProperties:
                type: integer
            avgDurationMs:
              type: number
          required: [totalRequests, byStatusClass, avgDurationMs]
      required: [startedAt, uptimeSec, http]
